l_english:

  miku.0.t:0 "The Arrival of Hatsune Miku"
  miku.0.d:0 "Hatsune Miku suddenly appeared in your country, and her appearance caused a nationwide sensation. People flocked to welcome this virtual singer. Her musical talent and charm captivated everyone. The people hope she will become the nation's leader and guide the country towards prosperity and innovation."
  miku.0.a:0 "Of course, I'm also a fan of Hatsune Miku!"
  miku.0.b:0 "Hatsune Miku is not a good choice!"