  miku.0.d:0 "初音未来突然出现在你的国家，她的出现引起了全国的轰动。人们纷纷前来欢迎这位虚拟歌手的到来。她的音乐才华和魅力让人们为之倾倒。人民希望她成为国家领袖，带领国家走向繁荣和创新。"
  miku.0.a:0 "当然，我也是初音未来的粉丝！"
  miku.0.b:0 "初音未来不是个好选择！"