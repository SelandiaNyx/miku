  miku_name:0 "初音未来"
  miku_country_leader_desc:0 "初音未来是一个虚拟歌手，拥有独特的声音和魅力。她以其音乐才华和可爱的形象赢得了全球粉丝的喜爱。作为国家领袖，她将带领国家走向繁荣和创新。"
