l_simp_chinese:
 miku_expand_state_slots_category:0 "§H国家城市化扩张计划§!"
 miku_expand_state_slots_category_desc:0 "通过中央指令与自动化规划，我们将系统性地提升各地区的行政级别，以容纳更多的工业设施。"
 miku_expand_slots_automation_investment:0 "启动：国家级城市化指令"
 miku_expand_slots_automation_investment_desc:0 "§W随着国家实力日益提升，现有工厂数量已难以满足需求。国家必须直接领导，紧急启动新一轮城市化计划。§!\n\n一旦该指令下达，我们将永久开启§G全自动城市化扩容系统§!。该系统会每§Y180§!天自动识别国内尚未满级的区块并进行升级，直到其达到§H特大城市(Megalopolis)§!级别为止。"
 miku_expand_slots_worker_cycle:0 "城市化进程：自动化升级中"
 miku_expand_slots_worker_cycle_desc:0 "§Y当前协议：§! [Root.GetName]\n§W自动化团队正在对受控领土进行扫描与施工。每180天，一个随机的低等级地块将获得行政级别提升。该过程完全自动化，无需人工干预。§!"
 miku_expand_slots_scanner_cycle:0 "城市化协议：低能耗扫描模式"
 miku_expand_slots_scanner_cycle_desc:0 "当前所有受控领土已达到最高城市化等级。系统正在后台静默运行，一旦获得新的未开发领土，将立即唤醒升级协议。"
 miku_expand_slots_all_maxed_tt:0 "§G所有受控领土已达到最高等级，自动化协议进入休眠模式。§!"