l_simp_chinese:

  miku_spirit_category:0 "初音未来的国家强化提案"
  miku_add_spirit_1:0 "组建陆地骑士团"
  miku_add_spirit_1_desc:0 "自愿守护公主殿下、愿意为公主殿下献上心脏的人民群众越来越多，公主殿下认为不能辜负了他们的心愿，同时也为了应对越来越动乱的世界格局，公主殿下宣布陆地骑士团正式组建。"
  miku_add_spirit_2:0 "组建海洋骑士团"
  miku_add_spirit_2_desc:0 "公主殿下眺望蔚蓝的海疆，意识到海上航线与港口的安全同样需要忠诚的守护。那些擅长水性、热爱航海的骑士们踊跃响应，海洋骑士团应运而生，他们将驾驭战舰，保卫公主殿下的每一片海域。"
  miku_add_spirit_3:0 "组建天空骑士团"
  miku_add_spirit_3_desc:0 "仰望苍穹，公主殿下决心让歌声与正义传遍每一个云端。英勇的飞行员与空降兵们集结于公主麾下，天空骑士团正式成立，他们将以敏捷的飞行器划破长空，为公主殿下夺取制空权。"
  miku_add_spirit_4:0 "建设未来军事学院"
  miku_add_spirit_4_desc:0 "为了培养更多德才兼备的骑士，公主殿下下令修建一所世界顶尖的军事学府。在这里，学员们不仅学习战略战术，更接受公主殿下的精神洗礼。未来军事学院将源源不断地输出忠诚而优秀的指挥官。"
  miku_add_spirit_5:0 "改革骑士团军官团"
  miku_add_spirit_5_desc:0 "公主殿下发现旧有的军官体系存在效率低下与官僚主义，于是亲自推动改革。精简层级、引入能力考核、强化忠诚教育，全新的军官团如同被调音过的乐器，能够奏出更和谐的胜利乐章。"
  miku_add_spirit_6:0 "开展全国巡回演唱会"
  miku_add_spirit_6_desc:0 "公主殿下的歌声是人民的力量源泉。一场盛大的全国巡回演唱会拉开帷幕，每到一处都万人空巷。这不仅提升了民众的士气与凝聚力，更让隐藏的反抗者在歌声中放下武器，自愿加入骑士团。"
  miku_add_spirit_7:0 "创立安保系统"
  miku_add_spirit_7_desc:0 "为了防范间谍与破坏活动，公主殿下建立了全方位的安保系统。从情报收集到反恐防暴，从网络防御到要人护卫，这套系统如同无形的护盾，确保公主殿下和国家的绝对安全。"
  miku_add_spirit_8:0 "未来超高效政府"
  miku_add_spirit_8_desc:0 "公主殿下本身拥有人类所无法比拟的高频思考速度，一人即可处理全国上下所有事物，打造了一个前所未有的高效政府。官僚延误成为历史，政策从出台到执行仅需数分钟，整个国家机器运转如飞。"
  miku_add_spirit_9:0 "未来超高效内阁"
  miku_add_spirit_9_desc:0 "公主殿下亲自选拔了一批兼具才华与忠诚的阁员，他们的意见将为公主殿下提供更加多元的视角，将每一个不同的声音传递给公主殿下。"
  miku_add_spirit_10:0 "未来超高效工业"
  miku_add_spirit_10_desc:0 "在公主殿下的指引下，工厂全面升级为自动化与AI协同的智能产线。国家工业的生产计划由公主殿下亲自进行数据分析来驱动，产能飙升，资源利用率高达99%，工业产出达到了不可思议的水平。"
  miku_add_spirit_11:0 "未来超高效建造工程"
  miku_add_spirit_11_desc:0 "在公主殿下的大力推动下，机械化、智能化成为建筑行业的风向，省去了大量时间的同时，工程质量也迎来了飞跃性提升。"
  miku_add_spirit_12:0 "ai修正"
  miku_add_spirit_12_desc:0 "一些ai相关的东西，我还没弄清楚有什么效果，不建议点"