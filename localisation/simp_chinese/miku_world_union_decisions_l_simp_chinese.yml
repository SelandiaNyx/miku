l_simp_chinese:
 # 决议组标题与描述
 miku_world_union_category: "初音未来：人类命运共同体"
 miku_world_union_category_desc: "当葱色的光芒划破地缘政治的迷雾，世界终于意识到：音乐是人类唯一的共同语言。我们不再以意识形态或国境线划分彼此，而是以名为『Hatsune Miku』的数字化共识为核心，构建一个超越纷争、共生共荣的全球共同体。在少女歌声的指引下，地球将不再是破碎的版图，而是一场永不落幕的全息音乐会。"

 # 决议 1：变傀儡 (建立伙伴关系)
 miku_world_union_puppet: "签署《葱绿全息战略共鸣协议》"
 miku_world_union_puppet_desc: "该国的政府与民间已经深度沉浸在数字化 divas 的旋律之中。通过签署这份协议，我们将确立双方的『频率同步』关系。虽然他们名义上保留一定的管理权，但实质上已经成为了共同体的一分子，在行政与防务上全面接受共同体总部的数字化指导。这并非屈服，而是向着人类共同未来的第一次大合唱。"

 # 决议 2：吞并 (全面并轨)
 miku_world_union_annex: "执行全球行政体系『全息并轨』"
 miku_world_union_annex_desc: "当我们的工业基数与数字化基建已达到对方的三倍以上，成员国的独立行政体系已显得冗余且低效。通过大规模的全息网络覆盖，我们将接管其所有的社会职能。从工厂的自动化管理到城市的数字治理，该国将彻底取消边界，将其行政权完全汇入人类命运共同体的洪流中。从此，他们的领土便是我们的舞台。"

 # 决议 3：核心化 (文化认同与核心共鸣)
 miku_world_union_core: "达成区域意识形态的『核心共鸣』"
 miku_world_union_core_desc: "该地区的人民已经完全适应了在歌声中生活。顺从度已经达到了前所未有的峰值，传统的民族国家意识已经淡去，取而代之的是对共同体核心价值观的绝对认同。通过最后一次深度的行政核心化处理，我们将把这片土地转化为我们不可分割的核心资产。在这里，每一扇窗户都将映射出葱色的微光。"

 # 提示信息与技术文本 (Tooltips)
 miku_annex_factory_check_tt: "§Y【系统自检】：宗主国的综合工业指数（民工+军工）需大于该成员国的 3.9 倍（当前逻辑为 3 倍）方可触发全息并轨§!"
 miku_annex_target: "共同体协约成员国"
 miku_integrated_state: "命运共同体·深度整合试验区"

 # 其他修正
 political_cooperation: "全息协约共鸣中"