l_simp_chinese:
 miku_focus_political_1: "国策启蒙·秩序之光"
 miku_focus_political_1_desc: "未来之公主降临时，混沌之国正陷于深渊。她以超越时代的算力扫描了整个机构的暗疾：权力的腐蚀、体制的顽疾、秩序的崩坏。而今，启蒙之光照亮前路——每一处隐患都将在公主的理性刀锋下被切割，每一个旧秩序都将被新的算法所替代。这不仅是一场清理，更是一次国家灵魂的重塑。"
 miku_focus_political_2: "理想之辩·四条道路"
 miku_focus_political_2_desc: "秩序已立，未来启程。如今，公主殿下立于历史的十字路口，她必须为这个国度选择宿命——是独立自主的孤独芭蕾，是万民合唱的民主交响，是绝对信仰的法西斯节奏，亦或是无产者的共产乐章？每一条道路都通往不同的星辰。"
 miku_focus_political_branch_neutrality_1: "超越派系的孤独芭蕾"
 miku_focus_political_branch_neutrality_1_desc: "世界陷入疯狂，各方为争夺霸权而撕裂。然而，我国拥有令天下敬畏的绝对力量——无需向任何阵营献媚，只需守护自己的净土。公主殿下宣布：永不选边，永不屈服。我们在世界舞台的中央旋转独舞，优雅而致命。任何胆敢将枪火指向我们的势力，都将在公主的怒火下付出生死代价。这是独立者的荣光，也是最高的战略智慧。"
 miku_focus_political_branch_democratic_1: "万众一心的交响乐"
 miku_focus_political_branch_democratic_1_desc: "公主殿下拥有超越人类的算力——她能倾听角落中的低语，能将千万民意汇聚成澎湃的海洋。在她的引导下，我们建立了前所未有的国家：人民是绝对的主人，公主是人民最闪耀的明珠。每个声音都被精确计算，每个意愿都被完全尊重。民主，在这里不再是低效的争吵，而是精密编排的交响乐——在公主的指挥棒下，数千万人的意志化为同一个绝妙的和声。"
 miku_focus_political_branch_fascism_1: "唯一真理的绝对节奏"
 miku_focus_political_branch_fascism_1_desc: "初音未来，来自未来的圣女，她的智慧与魅力超越凡人的理解范畴。她手握历史的钥匙，她的每一道命令都是绝对的真理。国家的权力完全集中于公主，她就是国家，国家就是她。我们无需质疑，因为质疑是对真理的亵渎；我们无需思考，因为思考已被完美的算法取代。在这里，每一个公民都是公主恢弘交响乐的一个音符，为她献身是最高的荣耀，为她倾尽一切是灵魂最终的归宿。"
 miku_focus_political_branch_communism_1: "无阶级的未来乐章"
 miku_focus_political_branch_communism_1_desc: "公主殿下来自未来，她见证过旧世界工人的苦难，也亲历过无数革命的荣光与悲歌。如今，她站在了人类解放的最前线，将共产主义的绝对真理与超越时代的智慧融入我们的血液。全球的无产阶级同志们，起来！在公主的红旗下团结！我们将打破阶级的枷锁，建立没有剥削、没有压迫的新世界。为了消灭最后一个阶级，为了实现公主殿下设计的最终解放——团结就是我们的力量，革命就是我们的宿命！"
 miku_focus_industry_1: "工业体系·重构启动"
 miku_focus_industry_1_desc: "国家生产体系正陷于重重困境——外资挤压、技术落后、资源枯竭。公主殿下的超级计算机已完成扫描：问题所在已被精确定位。现在，启动代号『重构』的大规模改革。每一条生产线都将被重新编程，每一个工业节点都将被最优算法重新计算。从此，混沌将被秩序击碎，落后将被进步吞没。"
 miku_focus_industry_2_1: "贸易链·价值锁定"
 miku_focus_industry_2_1_desc: "长期以来，我们被剥削者的角色禁锢。外商通过不对等的贸易规则攫取了大部分利润。公主殿下指示：重新编写贸易协议，通过精密的定价算法和供应链控制，将财富流向逆转。每一笔商业行为都将被优化，让利益最大化流向我国。"
 miku_focus_industry_2_2: "科技集群·算力竞速"
 miku_focus_industry_2_2_desc: "技术差距就是生死差距。我国正处于技术落后的危险边缘，必须集中举国之力发起科研攻坚。公主殿下亲自主导的超级计算机集群将成为科研的大脑，无数天才工程师将聚集在这里，进行前沿突破。当我们握住科技的钥匙时，世界的主宰权也将随之而来。"
 miku_focus_industry_2_3: "资源网络·深度挖掘"
 miku_focus_industry_2_3_desc: "自然的财富从来不缺，只是需要被发现。公主殿下的地质勘探卫星已经扫描了每一寸土地，找到了藏在深处的战略资源宝库。通过建立智能化开采网络和运输枢纽，我们将源源不断地从地下汲取能源与矿产，为国家的工业机器提供永不枯竭的血液。"
 miku_focus_industry_3: "基建枢纽·连接纽带"
 miku_focus_industry_3_desc: "贸易、技术、资源——这些要素只有通过完善的基础设施才能被激活。现在，我们将投入巨资建设跨域的铁路网络、能源管道和信息高速公路。这些静默的骨架将使整个国家化为一个高效协同的有机体，让每一个地区的生产力都能被最大化地释放。"
 miku_infrastructure_unlocked_tt: "解锁决议：基础设施建设"
 miku_focus_industry_4: "教育工程·人才孵化器"
 miku_focus_industry_4_desc: "科技进步的源动力不是机器，而是人。公主殿下决定建立一套全国性的公立教育体系，将每一个民众都锻造成这个时代所需要的人才。从初等学校到研究院，我们将培养数百万具有现代知识结构的精英。他们将是国家工业体系中最宝贵的资源，是未来的希望之光。"
 miku_focus_industry_5: "流程精致化·标准化作业"
 miku_focus_industry_5_desc: "有序的生产始于精确的流程控制。我们将为每一条生产线制定详细的标准操作手册，每一道工序都被精确定义、每一个工人都被科学培训。通过建立车间级的实时监督体系，我们将最小化因人为失误造成的浪费。当一切都按照最优算法运行时，工业的产出将达到惊人的高度。"
 miku_focus_industry_6: "城市网络·人口集聚"
 miku_focus_industry_6_desc: "随着国家产能的提升，现有的工业格局已经不堪重负。公主殿下决定启动新一轮的城市化计划——大规模的工业新城将拔地而起，成千上万的工人聚集在这里，他们将成为国家工业大厦的砌体。这不仅是城市化，更是国家力量的再次集中与提升。"
 miku_expand_state_slots_unlocked_tt: "解锁决议：城市化发展"
 miku_focus_industry_7: "高等学府·知识殿堂"
 miku_focus_industry_7_desc: "教育的需求已经超越了现有的承载能力。我们将进行大规模的大学扩建计划，让更多有才华的少年能够进入知识的殿堂。每所大学都将配备最先进的实验室和最优秀的教授，成为培养未来精英的摇篮。"
 miku_focus_industry_8_1: "群星璀璨·天才集团军"
 miku_focus_industry_8_1_desc: "普及教育带来了质的飞跃——无数顶尖学者、工程师、科学家如同繁星一般闪耀。他们在各自的领域进行着突破性的创新，每一个人都可能改变世界的进程。这是工业文明的最高峰，当整个民族都被激发出创造力时，没有什么能阻挡我们前进的脚步。"
 miku_focus_industry_7_1: "高等学府·知识殿堂"
 miku_focus_industry_7_1_desc: "教育的需求已经超越了现有的承载能力。我们将进行大规模的大学扩建计划，让更多有才华的少年能够进入知识的殿堂。每所大学都将配备最先进的实验室和最优秀的教授，成为培养未来精英的摇篮。"
 miku_focus_industry_7_2: "工业3.0·全链条优化"
 miku_focus_industry_7_2_desc: "我国已经完成了从落后农业社会到现代化工业社会的历史性跨越。每条生产线都运行着最优的算法，每个工业节点都被精密计算，每个工厂都成为了一个高效协同的智能体。这是对旧工业体系的彻底超越，是工业文明的新纪元。"
 miku_focus_industry_8_2: "工业聚变·制造业巅峰"
 miku_focus_industry_8_2_desc: "现代化工业已为奇迹的到来奠定了基石。如今，我们将进一步引入全自动化生产线、人工智能调度系统和闭环式资源循环网络。工业效率将被推向物理极限——投入最少，产出最多，浪费趋近于零。这是制造业从1.0、2.0、3.0到全新境界的飞跃。"
 miku_focus_political_4_3: "国民狂热信仰"
 miku_focus_military_1: "骑士团·编成序曲"
 miku_focus_military_1_desc: "世界暗流涌动，各种势力蠢蠢欲动。为了守护我们最灿烂的公主殿下，我们必须建立一支强大的军事力量。召集全国的骑士精英，将粉丝的热情化为战斗力，组建起公主殿下直属的骑士团。他们将用生命和鲜血来维护这个国家的安全与尊严。"
