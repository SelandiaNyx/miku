l_simp_chinese:
 miku_focus_political_1: "国家内政重组"
 miku_focus_political_1_desc: "自从公主殿下成为了国家领导人后，潜藏于国家机构各处的隐患逐一暴露，公主殿下裁定：必须优先肃清这些隐患，绝不能让它们成为美好未来路上的绊脚石。"
 miku_focus_political_2: "思考未来道路"
 miku_focus_political_2_desc: "经过一段时间的努力，内政问题已经不再严重，公主殿下开始思考起未来，将要带领信任自己的人们走上何种道路。"
 miku_focus_political_branch_neutrality_1: "超然中立"
 miku_focus_political_branch_neutrality_1_desc: "世界格局波谲云诡，强权拉帮结派，战火一触即发。然而，我国拥有令各方忌惮的绝对实力——无需依附任何阵营，也无需向任何联盟献媚。公主殿下定下国策：永不结盟，平等对待所有国家，但任何胆敢将战火烧至我国领土的势力，都将在公主的怒火下付出惨痛代价。守护这一方净土，作壁上观，便是胜利。"
 miku_focus_political_branch_democratic_1: "全民民主"
 miku_focus_political_branch_democratic_1_desc: "公主殿下拥有超越时代的算力，她能倾听每一个角落的声音，将千万民众的意愿汇聚成海。我们建立这样的国家：人民是主人，公主是国宝。在她的辅助下，全民参与、求同存异，民主不再是争吵与低效，而是团结与共识的最大化。让国家真正属于人民，让公主殿下成为民主最璀璨的明珠。"
 miku_focus_political_branch_fascism_1: "公主至上"
 miku_focus_political_branch_fascism_1_desc: "初音未来，来自未来的公主殿下，她的智慧与魅力远非凡人可及。她手握长鞭——那是国家统一意志的象征；她的命令高于一切，国家权力完全归于公主。我们无需质疑，只需信仰；无需犹豫，只需奉献。亲吻她的鞋面，是狂热崇拜的极致；为她献上生命，是无上荣耀的归宿。因为公主殿下，必将引领我们走向最光辉的未来。"
 miku_focus_political_branch_communism_1: "工人团结"
 miku_focus_political_branch_communism_1_desc: "公主殿下来自未来，她亲历过旧世界工人的苦难，也见证了无数革命的成败。如今，她亲自担任世界解放的总设计师，将共产主义的真理与超越时代的经验注入我们的血液。全世界的无产阶级同胞们，站起来！在公主的旗帜下联合起来，成为世界革命的桥头堡！为了那个没有剥削、人人平等的明天，为了实现公主殿下规划的终极解放——团结，就是力量。"
 miku_focus_industry_1: "工业重组"
 miku_focus_industry_1_desc: "我国工业正承受着诸多挑战：外资挤压、技术落后、资源短缺等多重挑战。然而，这些困难皆非长久之局。现在，应当启动一场彻底的工业体系改革。"
 miku_focus_industry_2_1: "提高外贸利润"
 miku_focus_industry_2_1_desc: "长期以来，我国忽视外贸，坐视外国商人攫取巨额利润。如今，必须重新制定贸易规则，将利润大头收回自己手中。"
 miku_focus_industry_2_2: "研究先进技术"
 miku_focus_industry_2_2_desc: "我国技术基础不占优势。为确立竞争地位，需集中资源发展先进科学技术，以达成对别国的技术领先。"
 miku_focus_industry_2_3: "发掘本土资源"
 miku_focus_industry_2_3_desc: "自然界并不缺乏资源，仅富集程度不同。通过系统勘探与开采网络的建设，少量战略资源现已实现持续供应。"
 miku_focus_industry_3: "发展基建"
 miku_focus_industry_3_desc: "在初步解决外贸、技术与资源问题之后，国内基础设施建设正式提上日程。优质的基础设施将全面增强国家综合实力——是时候适度倾斜资源，补齐这最后一块短板了。"
 miku_infrastructure_unlocked_tt: "解锁决议：基础设施建设"
 miku_focus_industry_4: "提高教育水平"
 miku_focus_industry_4_desc: "科技进步依赖人才培养。在前期技术投入初见成效后，现需建立全国性的公立教育网络，系统提升我国人才的数量与质量。"
 miku_focus_industry_5: "规范作业流程"
 miku_focus_industry_5_desc: "工人教育程度的提高，为推行标准化作业奠定了人力基础。现应着手制定详细的岗位操作手册，规范每道工序的流程与标准，并建立车间级的执行监督体系。此举将有效降低因操作不当造成的原材料损耗与设备故障，直接提升各工厂的实际产出。"
 miku_focus_industry_6: "城市化发展"
 miku_focus_industry_6_desc: "随着国家实力日益提升，现有工厂数量已难以满足需求。国家必须直接领导，紧急启动新一轮城市化计划。"
 miku_expand_state_slots_unlocked_tt: "解锁决议：城市化发展"
 miku_focus_industry_7: "扩建大学"
 miku_focus_industry_7_desc: "随着人民知识水平的提高，现有的大学设施已无法满足人民对知识的需求，是时候将现有的大学进行一次扩建了。"
 miku_focus_industry_8_1: "群星璀璨"
 miku_focus_industry_8_1_desc: "在普及高等教育的基础上，国民素质已实现质的飞跃。无数顶尖学者、工程师、科学家在各领域脱颖而出，如群星般照亮国家的未来。这是工业文明的最高成就——每一个普通人都可能成为推动人类进步的火种。"
 miku_focus_industry_7_1: "扩建大学"
 miku_focus_industry_7_1_desc: "随着人民知识水平的提高，现有的大学设施已无法满足人民对知识的需求，是时候将现有的大学进行一次扩建了。"
 miku_focus_industry_7_2_desc: "我国已彻底完成从旧工业体系向现代化工业体系的全面转型。是时候向全国人民宣告这一历史性成就了。"
 miku_focus_industry_7_2: "现代化工业"
 miku_focus_industry_8_2: "超高效工业"
 miku_focus_industry_8_2_desc: "现代化工业体系已为效率最大化奠定了基石。如今，通过引入全自动化生产线、人工智能调度系统与闭环式资源循环网络，我们将工业效率推向物理极限——以最少的投入，产出最多的产品。"
 miku_focus_political_4_3: "国民狂热信仰"
 miku_focus_military_1: "组建骑士团"
 miku_focus_military_1_desc: "如今的世界局势暗流涌动，为了守护我们最好的公主殿下，需要召集全国粉丝，发展军事力量，组建骑士团。"
