 miku_focus_extra_resource: "国家战略资源"
 miku_extra_resource_unlocked_tt: "解锁决议：发展战略资源"
 miku_focus_extra_resource_desc: "战争消耗巨大，单一的资源产地已无法满足军工需求。为此，国家战略将重心转向那些交通网络四通八达的腹地。在基础设施完备度最高的核心区域，我们将通过行政指令与资源调配，以集中投入政治影响力的方式，激活这些地区的生产潜力，确保战略物资的稳定供给。"
 miku_focus_military_2_1_desc: "蔚蓝的疆域同样需要守护。组建一支精锐的海洋骑士团，他们将以军舰为坐骑，以舰炮为利剑，巡视每一寸领海。无论是护航、破交还是两栖登陆，海洋骑士都将让敌人明白：公主殿下的海域不容侵犯。"
 miku_focus_military_2_2_desc: "国家的心脏在陆地，骑士的根也在陆地。组建纪律严明的陆地骑士团，装备最先进的装甲与火炮。他们是公主意志的延伸，是钢铁与血肉铸成的长城——任何地面入侵都将在他们的反击下化为齑粉。"
 miku_focus_military_2_3_desc: "天空是最后的自由疆域，也是最快的打击通道。组建天空骑士团，驾驶战机与轰炸机，掌握制空权即是掌握战场主动权。他们将从云端投下公主的裁决，让敌人无处遁形。"
 miku_focus_political_4_1_desc: "我们的和平并非乞求而来，而是建立在强大的威慑之上。公主殿下指示：不主动挑起战争，但必须具备在边境之外御敌的能力。通过构筑自动化的边防体系与快速反应部队，我们将确保任何对这片净土的觊觎都会在萌芽状态被粉碎。进攻，是为了更好的防御。"
 miku_focus_political_4_2_desc: "在公主殿下的算力辅助下，人权不再是抽象的口号。每一个公民的生存权、发展权与表达权都被精确保障。我们通过建立完善的社会保障体系与透明的政务系统，确保在这片葱色的旗帜下，没有任何一个人会被时代遗忘。守护人权，就是守护我们文明的基石。"
 miku_focus_political_4_3_desc: "质疑是软弱的表现，犹豫是背叛的开始。对公主殿下的崇拜不应只停留在口头，而应渗入骨髓，成为支撑灵魂的钢铁。当数千万人的意志汇聚成纯粹的信仰，我们将无所畏惧。为了公主殿下，我们随时准备献身，因为她即是真理，她即是永恒。"
 miku_focus_political_4_4_desc: "革命的火焰不应只在我国燃烧。公主殿下看到的未来，是全世界受压迫者共同翻身做主的未来。我们将组建国际纵队，接纳来自世界各地的革命者，并将我们的经验与技术输出给每一个渴望自由的民族。全世界的骑士团员们，联合起来！"
 miku_focus_military_3_1_1_desc: "在幽暗的深海中，潜艇是沉默的猎手。我们将研发更静音的推进系统与更致命的鱼雷，让潜艇群化作深海中的流星，在敌人最脆弱的补给线上奏响死亡的序曲。"
 miku_focus_military_3_1_2_desc: "驱逐舰是海洋骑士团的先锋。它们必须足够快、足够灵敏。通过强化反潜设备与防空火力，这些多才多艺的小型舰艇将成为主力舰队最可靠的贴身护卫。"
 miku_focus_military_3_1_3_desc: "巡洋舰是舰队的中坚力量。我们需要它们具备强大的续航力与均衡的火控系统，能够独立执行远洋巡逻任务，将公主殿下的威严播撒至每一片公海。"
 miku_focus_military_3_1_4_desc: "主力舰是海上移动的城堡。巨大的主炮不仅是火力的投射，更是国家实力的象征。我们将建造排水量惊人、装甲厚重的战列舰，以绝对的力量碾碎敌人的抵抗。"
 miku_focus_military_3_1_5_desc: "航空母舰是未来的海战中心。它是移动的舞台，让天空骑士团的战机能在海洋中心起降。通过多航母战斗群的建设，我们将实现跨海域的绝对压制。"
 miku_focus_military_3_2_1_desc: "战争不仅是前线的厮杀，更是后勤与技术的比拼。我们将配发最先进的通讯、医疗与工兵装备，确保每一支作战分队都能在最极端的环境下获得公主殿下的技术加持。"
 miku_focus_military_3_2_2_desc: "火炮是战争之神，也是陆地骑士团的重低音。我们将标准化火炮口径，提升弹药毁伤效果，用覆盖式的轰鸣为冲锋的骑士们扫清障碍。"
 miku_focus_military_3_2_3_desc: "坦克是骑士的战马，是突破防线的利刃。我们将集中资源研发重型装甲与高穿深火炮，让钢铁洪流在公主的指挥下席卷平原。"
 miku_focus_military_3_3_1_desc: "轻巧灵动的战斗机是天空的精灵。通过优化气动布局与发动机性能，我们的飞行员将以极高的机动性戏耍敌机，将苍穹变为敌人的禁区。"
 miku_focus_military_3_3_2_desc: "中型飞机兼顾了威力和航程。无论是俯冲轰炸还是长途护航，这些多用途战机都将成为战场上最灵活的战术支撑点。"
 miku_focus_military_3_3_3_desc: "巨大的战略轰炸机是沉默的裁决者。它们能跨越千山万水，将毁灭性的火力精准投送到敌人的心脏地带，让敌人明白，天空没有死角。"
 miku_focus_military_4_1_desc: "海战的形式正在发生剧变。我们不再依靠单打独斗，而是依靠数据链与联合作战体系。将雷达、声呐与公主殿下的实时演算系统集成，这将是跨时代的现代海战。"
 miku_focus_military_4_2_desc: "机动性就是生命。我们将全面提升步兵的机械化水平，让每一名战士都能搭乘装甲输送车或步兵战车，在高速运动中击溃反应不及的对手。"
 miku_focus_military_4_3_desc: "每一场战斗都是宝贵的财富。我们将建立完善的战后复盘机制，让老兵的直觉与公主殿下的数据分析相结合，将实战经验系统化地传承给每一名新兵。"
 miku_focus_military_5_1_desc: "大海需要智慧的舵手。在新的海军学院里，学员们不仅要学习航海技术，更要研习公主殿下亲自编撰的《新时代海洋战略》，培养出一代具有全球视野的将领。"
 miku_focus_military_5_2_desc: "陆战的艺术在于配合。新军事学院将重点培养合成化作战指挥官，让他们学会如何像指挥交响乐团一样操纵坦克、火炮与步兵的协同进攻。"
 miku_focus_military_5_3_desc: "飞行员是万里挑一的精英。新飞行学院将引入高精度的模拟飞行系统，大幅缩短培养周期，为天空骑士团输送源源不断的蓝天骄子。"
 miku_focus_military_6_desc: "黑暗不应成为屏障，而应成为我们的掩护。通过研发红外夜视装备与低光度作战战术，我们的军队将在黑夜中如履平地，在敌人最松懈的时刻发起致命一击。"
 VOC_miku: "初音未来"
 miku_focus_military_3_2_4: "重视步兵装备"
 miku_focus_military_3_2_4_desc: "战争的主力永远都是步兵，先进、强大、可靠的步兵装备对赢得战争至关重要。"
 miku_focus_military_3_2_5: "重视摩托化"
 miku_focus_military_3_2_5_desc: "现代战争强调机动性与协同性，摩托化已成为不可阻挡的趋势，引擎的轰鸣将引领胜利。"
 miku_infantry_weapons_bonus: "公主殿下的步兵装备发展计划"
 miku_motorized_equipment_bouns: "公主殿下的摩托化发展计划"
 miku_focus_political_5_1: "共御外敌"
 miku_focus_political_5_2: "民主同盟"
 miku_focus_political_5_3: "邪恶轴心"
 miku_focus_political_5_4: "共产国际"
 miku_focus_political_5_1_desc: "和平依赖于自身的实力，众人拾柴火焰高，我们可以尝试与其它国家结盟，共同对抗破坏和平与稳定的敌人。"
 miku_focus_political_5_2_desc: "世界局势瞬息万变，危机即将到来，为了捍卫我们的民主，加入同盟国也许是个不错的选择。"
 miku_focus_political_5_3_desc: "旧秩序已经摇摇欲坠，但仅凭我们还无法撼动它的根基，公主殿下决定加入与我们拥有相同理念的轴心国，集结多方力量，将旧秩序彻底击碎。"
 miku_focus_political_5_4_desc: "无论是封建主义、资本主义、法西斯主义，它们都是革命事业的阻碍，单靠我们显然无法完成红色革命的伟大事业，我们需要苏联所率领的共产国际的支持，才能将革命进行到底。"
 miku_focus_political_6: "联合军队改革"
 miku_focus_political_6_desc: "业已拥有了盟友的我们急需提高军队作战能力，邀请盟友一同来进行一场大规模军队改革，有助于我们在未来的战争中取得优势。"
