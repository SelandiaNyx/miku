l_simp_chinese:
  # 决策分类
  miku_extra_resource_category: "葱绿工业：全息采掘体系"
  miku_extra_resource_category_desc: "基于『39-H型』全息谐振原理，我们正在国内构建一套去中心化的资源提取网络。通过数字化声波扫描我国地壳深层频率，系统可以自主感应并提取原本无法利用的矿脉资源。"

  # 1. 投资决策 (初始化 - 365天)
  miku_extra_resource_investment: "全息采掘协议：系统初始化"
  miku_extra_resource_investment_desc: "我们将投入§Y200§!点算力储备，在全国范围内布设全息共鸣探测器。这一过程需要§Y365天§!来校准地质频谱并部署硬件终端。部署完成后，系统将永久启动§G自动化采掘循环§!。"
  miku_resource_investment_completed_tt: "§G全息谐振设备已遍布全国，自动化资源扫描序列正式启动。§!"

  # 2. 自动化采掘循环 (30天周期)
  miku_extra_resource_auto_extraction: "全息采掘循环：资源提取中"
  miku_extra_resource_auto_extraction_desc: "§H系统运行状态：正常§!\n\n当前状态：§G正在进行30天周期性扫描§!\n探测技术：§Y数字化谐振提取 (1-10阶强度)§!\n\n系统正向地层发射数字化波束，将在我国一个§Y基础设施完备§!的受控省份中感应资源。每一轮采掘的增产数额由地质波动的振幅决定。\n\n§W本轮扫描可能涵盖的资源：§!\n- §H钢铁、铝、钨、铬、石油、橡胶、煤炭§!"

  # 3. 系统重置决策 (1天)
  miku_extra_resource_auto_prepairation: "全息系统：数据同步"
  miku_extra_resource_auto_prepairation_desc: "上一轮采掘数据已归档。系统正在重置谐振频率以准备下一周期的扫描脉冲。"

  # 标志位与状态
  miku_resource_automation_active: "全息采掘协议运行中"
  miku_extra_resource_auto_extraction_completed: "周期性探测指令已下达"

  # 备用/其他
  miku_initiate_resource_system: "启动全息探测自动循环"
  miku_initiate_resource_system_desc: "设备已就绪，现在我们可以正式接入全国工业网络，开始自动化的资源提取作业。"